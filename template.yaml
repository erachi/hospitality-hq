AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Hospitality HQ — Guest monitoring system for Hospitable properties.
  Real-time webhook processing + hourly safety-net polling.
  Classifies guest issues, drafts responses, posts to Slack for human approval.
  Secrets are stored in SSM Parameter Store, not in environment variables.

Parameters:
  SlackChannelId:
    Type: String
    Description: Slack channel ID for #guest-alerts
  PropertyUuids:
    Type: String
    Default: "f8236d9d-988a-4192-9d16-2927b0b9ad8e,3278e9cb-9239-487f-aa51-cbfbaf4b7570"
    Description: Comma-separated property UUIDs to monitor
  SSMPrefix:
    Type: String
    Default: "/hospitality-hq"
    Description: SSM Parameter Store path prefix for secrets
  AlarmEmail:
    Type: String
    Description: Email address to receive CloudWatch alarm notifications
  OpsSlackChannelId:
    Type: String
    Description: Slack channel ID for ops alerts (e.g. #hospitality-hq-ops)
  TasksChannelId:
    Type: String
    Default: ""
    Description: Slack channel ID where task cards are posted (e.g. #tasks)
  TasksBucketName:
    Type: String
    Default: "hospitality-hq-tasks"
    Description: S3 bucket holding task JSON objects and static config
  ExpensesBucketName:
    Type: String
    Default: "hospitality-hq-expenses"
    Description: S3 bucket holding expense JSON + receipt images
  ExpensesChannelId:
    Type: String
    Default: ""
    Description: Slack channel ID for #expenses (where receipts are dropped)

Globals:
  Function:
    Timeout: 120
    Runtime: python3.12
    MemorySize: 256

Resources:
  # ═══════════════════════════════════════════════════════════════
  # Core application — webhook + monitor
  # ═══════════════════════════════════════════════════════════════

  WebhookApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      Description: HTTPS endpoint for Hospitable webhook events

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hospitality-hq-webhook
      Handler: webhook_handler.webhook_handler
      CodeUri: src/
      Description: Processes real-time Hospitable webhook events
      Environment:
        Variables:
          SSM_PREFIX: !Ref SSMPrefix
          SLACK_CHANNEL_ID: !Ref SlackChannelId
          PROPERTY_UUIDS: !Ref PropertyUuids
          DYNAMODB_TABLE: !Ref MessagesTable
          THREAD_MAPPING_TABLE: !Ref ThreadMappingTable
          THREAD_LOGS_TABLE: !Ref ThreadLogsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ThreadMappingTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ThreadLogsTable
        # NOTE: We build the SSM ARN explicitly instead of using SAM's
        # SSMParameterReadPolicy macro. The macro concatenates "parameter/" +
        # ParameterName, so a ParameterName that starts with "/" (like
        # "/hospitality-hq/*") yields "parameter//hospitality-hq/*" — an
        # invalid ARN that silently denies all reads.
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMPrefix}/*"
      Events:
        WebhookPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /webhook
            Method: POST

  MonitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hospitality-hq-monitor
      Handler: handler.lambda_handler
      CodeUri: src/
      Description: Hourly safety-net poll for any missed webhook events
      Environment:
        Variables:
          SSM_PREFIX: !Ref SSMPrefix
          SLACK_CHANNEL_ID: !Ref SlackChannelId
          PROPERTY_UUIDS: !Ref PropertyUuids
          DYNAMODB_TABLE: !Ref MessagesTable
          THREAD_MAPPING_TABLE: !Ref ThreadMappingTable
          THREAD_LOGS_TABLE: !Ref ThreadLogsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ThreadMappingTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ThreadLogsTable
        # NOTE: We build the SSM ARN explicitly instead of using SAM's
        # SSMParameterReadPolicy macro. The macro concatenates "parameter/" +
        # ParameterName, so a ParameterName that starts with "/" (like
        # "/hospitality-hq/*") yields "parameter//hospitality-hq/*" — an
        # invalid ARN that silently denies all reads.
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMPrefix}/*"
      Events:
        ScheduledCheck:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Description: Hourly safety-net check for missed webhook events
            Enabled: true

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hospitality-hq-messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: reservation_uuid
          AttributeType: S
        - AttributeName: message_id
          AttributeType: S
      KeySchema:
        - AttributeName: reservation_uuid
          KeyType: HASH
        - AttributeName: message_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ═══════════════════════════════════════════════════════════════
  # Slack thread interactions: in-thread Q&A + note/issue/resolution logs
  # ═══════════════════════════════════════════════════════════════

  # Maps Slack thread_ts → reservation context. Written by the alert posters
  # (monitor + webhook), read by the thread event handler.
  ThreadMappingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hospitality-hq-thread-mapping
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: thread_ts
          AttributeType: S
      KeySchema:
        - AttributeName: thread_ts
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Stores notes/issues/resolutions scoped to a reservation. Read by draft_response
  # and by the Q&A path so prior context informs future replies.
  ThreadLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hospitality-hq-thread-logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: reservation_uuid
          AttributeType: S
        - AttributeName: log_id
          AttributeType: S
      KeySchema:
        - AttributeName: reservation_uuid
          KeyType: HASH
        - AttributeName: log_id
          KeyType: RANGE

  # Receives Slack Events API callbacks for in-thread replies.
  ThreadEventHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hospitality-hq-slack-events
      Handler: thread_handler.slack_events_handler
      CodeUri: src/
      Timeout: 15  # Slack retries after 3s; keep handler tight
      Description: Processes Slack thread replies (Q&A, notes, issues, resolutions)
      Environment:
        Variables:
          SSM_PREFIX: !Ref SSMPrefix
          SLACK_CHANNEL_ID: !Ref SlackChannelId
          PROPERTY_UUIDS: !Ref PropertyUuids
          THREAD_MAPPING_TABLE: !Ref ThreadMappingTable
          THREAD_LOGS_TABLE: !Ref ThreadLogsTable
          DYNAMODB_TABLE: !Ref MessagesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ThreadMappingTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ThreadLogsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMPrefix}/*"
      Events:
        SlackEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /slack/events
            Method: POST

  # ═══════════════════════════════════════════════════════════════
  # Task-management workflow: /task slash command, interactive buttons,
  # thread-reply comments, daily overdue escalator. All state lives in S3.
  # ═══════════════════════════════════════════════════════════════

  # Bucket holds:
  #   config/properties.json, config/users.json — static seed data
  #   tasks/<id>.json                           — one object per task
  #   indexes/slack/<thread_ts>.json            — thread → task pointers
  # Versioning on gives us an audit trail for free.
  TasksBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref TasksBucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ═══════════════════════════════════════════════════════════════
  # Expense-capture workflow — S3 storage for receipts and metadata
  # ═══════════════════════════════════════════════════════════════
  #
  # Bucket holds:
  #   expenses/<year>/<id>.json       — one object per expense
  #   receipts/<year>/<id>.<ext>      — original image (Object Lock per-object)
  #   thumbs/<year>/<id>.jpg          — preview served to Slack
  #   exports/<year>/<export_id>.zip  — year-end accountant bundle
  #   indexes/slack/<thread_ts>.json  — thread → expense pointer
  #
  # Object Lock is enabled at bucket creation (required — cannot be added
  # later). No default retention — retention is applied per-object when
  # uploading to receipts/, so JSON metadata and exports remain mutable.
  ExpensesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ExpensesBucketName
      ObjectLockEnabled: true
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: transition-receipts-to-deep-archive
            Status: Enabled
            Prefix: receipts/
            Transitions:
              - TransitionInDays: 365
                StorageClass: DEEP_ARCHIVE
          - Id: expire-exports-after-90-days
            Status: Enabled
            Prefix: exports/
            ExpirationInDays: 90

  # Handles all Slack traffic for the task workflow: slash commands,
  # interactive components (buttons + modal submissions), and thread
  # replies as comments.
  TaskSlackHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hospitality-hq-task-slack
      Handler: task_handler.slack_tasks_handler
      CodeUri: src/
      Timeout: 15  # Slack retries after 3s; keep handler tight
      Description: Slack slash commands, modals, buttons, and thread replies for tasks
      Environment:
        Variables:
          SSM_PREFIX: !Ref SSMPrefix
          TASKS_BUCKET: !Ref TasksBucket
          TASKS_CHANNEL_ID: !Ref TasksChannelId
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref TasksBucket
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMPrefix}/*"
      Events:
        SlashCommand:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /slack/tasks/commands
            Method: POST
        Interactions:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /slack/tasks/interactions
            Method: POST
        TaskEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /slack/tasks/events
            Method: POST

  # Daily digest of overdue + due-today tasks. Sends DMs to each assignee
  # and shouts anything badly overdue into the channel.
  TaskEscalator:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hospitality-hq-task-escalator
      Handler: task_escalator.lambda_handler
      CodeUri: src/
      Description: Daily overdue-task digest — DMs and channel summary
      Environment:
        Variables:
          SSM_PREFIX: !Ref SSMPrefix
          TASKS_BUCKET: !Ref TasksBucket
          TASKS_CHANNEL_ID: !Ref TasksChannelId
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref TasksBucket
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMPrefix}/*"
      Events:
        DailyDigest:
          Type: Schedule
          Properties:
            # 16:00 UTC = 09:00 America/Phoenix (MST, no DST). Phoenix
            # does not observe DST, so this mapping is stable year-round.
            Schedule: cron(0 16 * * ? *)
            Description: Daily task digest at 9am Phoenix
            Enabled: true

  # ═══════════════════════════════════════════════════════════════
  # Observability: SNS topic → Email + Slack alarm handler
  # ═══════════════════════════════════════════════════════════════

  AlarmsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: hospitality-hq-alarms
      DisplayName: Hospitality HQ Alarms

  AlarmsEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlarmsTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  AlarmHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hospitality-hq-alarm-handler
      Handler: alarm_handler.alarm_handler
      CodeUri: src/
      Timeout: 30
      Description: Forwards CloudWatch alarms to the ops Slack channel
      Environment:
        Variables:
          SSM_PREFIX: !Ref SSMPrefix
          OPS_SLACK_CHANNEL_ID: !Ref OpsSlackChannelId
      Policies:
        # NOTE: We build the SSM ARN explicitly instead of using SAM's
        # SSMParameterReadPolicy macro. The macro concatenates "parameter/" +
        # ParameterName, so a ParameterName that starts with "/" (like
        # "/hospitality-hq/*") yields "parameter//hospitality-hq/*" — an
        # invalid ARN that silently denies all reads.
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMPrefix}/*"
      Events:
        AlarmsSNS:
          Type: SNS
          Properties:
            Topic: !Ref AlarmsTopic

  # ═══════════════════════════════════════════════════════════════
  # Log metric filters — derive custom metrics from existing log lines
  # Namespace: HospitalityHQ
  # ═══════════════════════════════════════════════════════════════

  SlackPostsSucceededFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MonitorFunction}"
      FilterPattern: '"Posted Slack alert for message"'
      MetricTransformations:
        - MetricNamespace: HospitalityHQ
          MetricName: SlackPostsSucceeded
          MetricValue: "1"
          DefaultValue: 0

  SlackPostsSucceededWebhookFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${WebhookFunction}"
      FilterPattern: '"Posted Slack alert for webhook"'
      MetricTransformations:
        - MetricNamespace: HospitalityHQ
          MetricName: SlackPostsSucceeded
          MetricValue: "1"
          DefaultValue: 0

  ReservationProcessingErrorsFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MonitorFunction}"
      FilterPattern: '"Error processing reservation"'
      MetricTransformations:
        - MetricNamespace: HospitalityHQ
          MetricName: ReservationProcessingErrors
          MetricValue: "1"
          DefaultValue: 0

  HighUrgencyMessagesFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MonitorFunction}"
      FilterPattern: '"/ HIGH"'
      MetricTransformations:
        - MetricNamespace: HospitalityHQ
          MetricName: HighUrgencyMessages
          MetricValue: "1"
          DefaultValue: 0

  HospitableAuthErrorsMonitorFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MonitorFunction}"
      FilterPattern: '"401 Client Error"'
      MetricTransformations:
        - MetricNamespace: HospitalityHQ
          MetricName: HospitableAuthErrors
          MetricValue: "1"
          DefaultValue: 0

  HospitableAuthErrorsWebhookFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${WebhookFunction}"
      FilterPattern: '"401 Client Error"'
      MetricTransformations:
        - MetricNamespace: HospitalityHQ
          MetricName: HospitableAuthErrors
          MetricValue: "1"
          DefaultValue: 0

  WebhookAuthFailuresFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${WebhookFunction}"
      FilterPattern: '"Invalid webhook signature"'
      MetricTransformations:
        - MetricNamespace: HospitalityHQ
          MetricName: WebhookAuthFailures
          MetricValue: "1"
          DefaultValue: 0

  # ═══════════════════════════════════════════════════════════════
  # CloudWatch alarms
  # ═══════════════════════════════════════════════════════════════

  NoSlackPostsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hospitality-hq-no-slack-posts-24h
      AlarmDescription: "No Slack alerts posted in 24h — system may be silently broken"
      MetricName: SlackPostsSucceeded
      Namespace: HospitalityHQ
      Statistic: Sum
      Period: 86400  # 24 hours
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlarmsTopic
      OKActions:
        - !Ref AlarmsTopic

  HospitableAuthErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hospitality-hq-hospitable-auth-errors
      AlarmDescription: "Hospitable API returning 401 — rotate the API token"
      MetricName: HospitableAuthErrors
      Namespace: HospitalityHQ
      Statistic: Sum
      Period: 300  # 5 min
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmsTopic
      OKActions:
        - !Ref AlarmsTopic

  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hospitality-hq-lambda-errors
      AlarmDescription: "Sustained Lambda errors in monitor or webhook function"
      EvaluationPeriods: 3
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Metrics:
        - Id: monitor_errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref MonitorFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: webhook_errors
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref WebhookFunction
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: total_errors
          Expression: monitor_errors + webhook_errors
          Label: Total Lambda Errors
          ReturnData: true
      AlarmActions:
        - !Ref AlarmsTopic
      OKActions:
        - !Ref AlarmsTopic

  # ═══════════════════════════════════════════════════════════════
  # CloudWatch dashboard
  # ═══════════════════════════════════════════════════════════════

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: hospitality-hq
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Invocations",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${MonitorFunction}" ],
                  [ ".", ".", ".", "${WebhookFunction}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "${MonitorFunction}" ],
                  [ ".", ".", ".", "${WebhookFunction}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Duration (p95)",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${MonitorFunction}", { "stat": "p95" } ],
                  [ ".", ".", ".", "${WebhookFunction}", { "stat": "p95" } ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "API Gateway — Requests & 4xx/5xx",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiId", "${WebhookApi}" ],
                  [ ".", "4xx", ".", "." ],
                  [ ".", "5xx", ".", "." ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Slack Posts Succeeded",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "HospitalityHQ", "SlackPostsSucceeded", { "stat": "Sum" } ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Custom: Errors & Auth Failures",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "HospitalityHQ", "ReservationProcessingErrors", { "stat": "Sum" } ],
                  [ ".", "HospitableAuthErrors", { "stat": "Sum" } ],
                  [ ".", "WebhookAuthFailures", { "stat": "Sum" } ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 18, "width": 12, "height": 6,
              "properties": {
                "title": "High Urgency Messages",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "HospitalityHQ", "HighUrgencyMessages", { "stat": "Sum" } ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 18, "width": 12, "height": 6,
              "properties": {
                "title": "DynamoDB Throttles",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/DynamoDB", "ThrottledRequests", "TableName", "${MessagesTable}" ]
                ]
              }
            }
          ]
        }

Outputs:
  WebhookApiUrl:
    Description: Webhook endpoint URL — register this with Hospitable
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook"
  MonitorFunctionArn:
    Description: ARN of the safety-net polling Lambda function
    Value: !GetAtt MonitorFunction.Arn
  WebhookFunctionArn:
    Description: ARN of the webhook processing Lambda function
    Value: !GetAtt WebhookFunction.Arn
  MessagesTableName:
    Description: Name of the DynamoDB messages table
    Value: !Ref MessagesTable
  AlarmsTopicArn:
    Description: SNS topic for CloudWatch alarms
    Value: !Ref AlarmsTopic
  DashboardUrl:
    Description: CloudWatch dashboard URL
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${Dashboard}"
  TasksBucketName:
    Description: S3 bucket holding task JSON objects and static config
    Value: !Ref TasksBucket
  TaskSlashCommandUrl:
    Description: Slack slash command Request URL — point /task here
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/slack/tasks/commands"
  TaskInteractionsUrl:
    Description: Slack interactivity Request URL — point Interactivity here
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/slack/tasks/interactions"
  TaskEventsUrl:
    Description: Slack events Request URL — subscribe message.channels here
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/slack/tasks/events"
  ExpensesBucketName:
    Description: S3 bucket holding expense JSON and receipt images
    Value: !Ref ExpensesBucket
