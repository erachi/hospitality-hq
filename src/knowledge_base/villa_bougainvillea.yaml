    answer: The switch is located outside to the right of the sliding glass door, under the outlet cover.
    source_reservations:
    - 03fa5606-cf82-4934-89f5-1b71ad989a10
    last_seen: '2026-04-18'
  - topic: volleyball_net
    question: Can I remove the volleyball net, and how?
    answer: Yes. To remove the net, push the metal tabs on the poles just below the edge of the net to
      release the upper portion of the pole. Do not attempt to disconnect the net from the upper part
      of the pole.
    source_reservations:
    - 03fa5606-cf82-4934-89f5-1b71ad989a10
    last_seen: '2026-04-18'
  - topic: tv_setup
    question: How do I operate the TVs in the house?
    answer: The living room, bunk room, and back bedroom go directly into guest mode using the Roku remotes
      only. The green room and second-to-back bedroom require turning on with the TV remote first, then
      switching to HDMI, and then using the Roku remote to enter guest mode.
    source_reservations:
    - 03fa5606-cf82-4934-89f5-1b71ad989a10
    last_seen: '2026-04-18'
  - topic: pool_vacuum
    question: Can I remove or unplug the pool vacuum?
    answer: Please do not unplug or remove the pool vacuum. It is needed to keep the pool clean during
      your stay.
    source_reservations:
    - 03fa5606-cf82-4934-89f5-1b71ad989a10
    last_seen: '2026-04-18'
  - topic: first_aid
    question: Is there a first aid kit on the property?
    answer: Yes, a first aid kit is stored in the drawer of the primary bathroom.
    source_reservations:
    - 03fa5606-cf82-4934-89f5-1b71ad989a10
    last_seen: '2026-04-18'
  - topic: fridge_stocking
    question: Can I arrange fridge stocking or other services before arrival?
    answer: Yes, fridge stocking and vendor coordination services are available through the host's HostCo
      store link provided at booking.
