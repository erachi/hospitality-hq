property:
  id: f8236d9d-988a-4192-9d16-2927b0b9ad8e
  name: Villa Bougainvillea
  nickname: Cooper/Anderson House 5120
  address: 5120 N 87th St, Scottsdale, AZ
  welcome_message: We're so excited to host you at our little piece of Scottsdale paradise. Whether you're
    here to relax, celebrate, or explore the desert beauty, we've designed Villa Bougainvillea to make
    your stay truly unforgettable. From the cozy indoor spaces to the vibrant outdoor amenities, we hope
    you enjoy every moment. If you need anything at all during your stay, please don't hesitate to reach
    out — we're here to help and ensure your experience is seamless.
static:
  wifi:
    network: Villa Bougainvillea
    password: welcome5120!!
  parking:
    driveway_capacity: 2 vehicles
    street_parking: Not permitted
  trash:
    collection_days: Mondays and Fridays
    recycling_rule: Do NOT place plastic bags in the recycling bin.
  regular_service:
    landscaping:
      day: Every Tuesday
    pool_servicing:
      day: Every Thursday
    access: Landscapers and pool technicians access the property via the side gate — they do NOT enter
      the house.
  pool:
    heating:
      advance_notice: At least 48 hours
      service_charge: Yes — a service charge applies (amount varies)
      how_to_request: Message us at least 48 hours before you'd like heating on.
    vacuum: Please do NOT unplug or remove the pool vacuum — it keeps the pool clean for your use.
  games_and_floaties:
    location: Deck box outside.
  volleyball_net:
    removal_instructions: The net is secured to the entire top portion of the poles. If you'd like to
      remove it, push the metal tabs on the poles right below the edge of the net — this releases the
      upper portion for removal. Do NOT attempt to disconnect the net from the upper part of the pole.
  tvs:
    direct_roku:
      rooms:
      - Living room
      - Bunk room
      - Back bedroom
      instructions: Set up to go directly into guest mode using Roku remotes only.
    tv_remote_required:
      rooms:
      - Green room
      - Second-to-back bedroom
      instructions: Turn on with TV remote and go directly to HDMI. Then switch to Roku remote — will
        go into guest mode.
  projector:
    location: Master bedroom closet.
    return_policy: Return projector, stand, and all accessories to the master bedroom closet after each
      use.
    setup_steps:
    - Strap the projector to the stand and set up behind the bean bags (near the tree is best).
    - Plug speakers in with the black extension cord; grey cord is for the projector.
    - Turn the projector on using remote or button on projector.
    - Focus the lens for crisp picture on screen.
    - Use main remote to navigate to Bluetooth. Speakers must be plugged in to pair.
    - Choose to screen-mirror from your device or use Roku.
    - Use main remote to navigate to HDMI to access Roku.
    - Once in Roku, use Roku remote to navigate to apps.
  string_lights:
    switch_location: Outside, to the right of the sliding glass door under the outlet cover.
  firepit:
    fuel: Propane
    propane_storage: White table beside firepit
    lighting_steps:
    - Turn on the gas at the tank.
    - Push and hold the igniter button.
    - While holding the button, push and turn the control knob to LOW.
    - Once ignited, control the temperature with the control knob.
    shutdown: Turn off both the flame and propane when done. Allow pit to fully cool before replacing
      the cover.
    maintenance: Igniter has an AA battery that needs periodic replacement.
    troubleshooting:
      does_not_light:
      - Igniter pin and burner are wet → dry off with a cloth.
      - Igniter battery is incorrectly installed or needs replacement.
      - Igniter pin is broken → contact manufacturer for replacement.
      - Rocks covering spark guard → remove the rocks and try again.
      burner_does_not_light_with_match:
      - No gas flow → check the tank.
      - Regulator isn't connected securely → tighten to the gas tank.
      - Gas flow is obstructed → check all hoses for kinks and bends.
      - Burner holes are clogged → turn all gas flow connections off, insert an opened paper clip into
        each burner port to clear them.
      excess_black_smoke:
      - Flame is obstructed at burner holes → check that burner holes are free of small lava rocks.
      - Regulator hose is kinked → straighten hose of all bends.
      flame_blows_out_easily:
      - High or gusting winds → increase flame to HIGH.
      - No gas flow → check that tank isn't empty.
      - Excess flow safety valve activated → see sudden-drop-in-gas-flow section.
      sudden_drop_in_gas_flow:
        cause: Tank is empty OR excess flow safety valve activated.
        reset_steps:
        - Turn the control knob to OFF.
        - Close the tank valve and disconnect the propane tank.
        - Turn the control knob to HIGH, wait 1 minute.
        - Turn the control knob back to OFF.
        - Reconnect the propane tank.
        - Light the firepit as usual.
  bbq:
    type: Gas BBQ (propane)
    operation: Turn on propane, hold down the ignite button while turning the burners on.
    tool_location: Grill tools stored in the kitchen.
  first_aid_kit:
    location: Drawer of the primary bathroom.
  pets:
    allowed: false
    policy: No pets allowed.
  check_in: {}
  check_out: {}
  house_rules: []
  emergency_contacts: {}
dynamic:
  faqs:
  - topic: early_checkin
    question: Is an early check-in possible?
    answer: Early check-in cannot always be accommodated, especially when there is a group checking out
      the same morning and time is needed to prepare the property. Standard check-in is at 4:00 PM. Any
      earlier check-in time must be mutually agreed upon in advance.
    source_reservations:
    - a0497b8c-c546-4cea-afea-757a03d4cdf6
    last_seen: '2026-04-18'
  - topic: luggage_dropoff
    question: Can we drop off luggage or equipment at the property before check-in time?
    answer: Unfortunately, luggage or equipment drop-offs before check-in cannot be accommodated, as there
      is no one available to provide access to the garage prior to check-in.
    source_reservations:
    - a0497b8c-c546-4cea-afea-757a03d4cdf6
    last_seen: '2026-04-18'
  - topic: checkout_procedure
    question: What is the check-out procedure?
    answer: 'Check-out is at 10:00 AM. Please: (1) Place used towels and washcloths on the bathroom floor
      and bring pool towels in from outside. (2) Leave sheets and comforters on the beds as-is. (3) Dispose
      of all trash in the outdoor trash cans. (4) Empty the grill of food or trash, ensure it is off,
      and do not place hot ashes in trash cans. (5) Turn off all lights and ensure the stove is off. (6)
      Return any rearranged furniture to its original location. (7) Check for personal belongings — forgotten
      items cannot be returned. (8) Lock all doors including sliding doors before departing.'
    source_reservations:
    - a0497b8c-c546-4cea-afea-757a03d4cdf6
    last_seen: '2026-04-18'
  - topic: pool_heating
    question: Can the pool be heated, and is there a cost?
    answer: Yes, pool heating is available. Please request it at least 48 hours in advance and a service
      charge applies.
    source_reservations:
    - a0497b8c-c546-4cea-afea-757a03d4cdf6
    last_seen: '2026-04-18'
  - topic: pool_vacuum
    question: Can we remove or unplug the pool vacuum?
    answer: Please do not unplug or remove the pool vacuum. It is needed to keep the pool clean during
      your stay.
    source_reservations:
    - a0497b8c-c546-4cea-afea-757a03d4cdf6
    last_seen: '2026-04-18'
