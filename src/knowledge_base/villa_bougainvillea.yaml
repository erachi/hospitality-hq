  name: "Villa Bougainvillea"
  nickname: "Cooper/Anderson House 5120"
  address: "5120 N 87th St, Scottsdale, AZ"
  welcome_message: >-
    We're so excited to host you at our little piece of Scottsdale paradise. Whether you're here
    to relax, celebrate, or explore the desert beauty, we've designed Villa Bougainvillea to make
    your stay truly unforgettable. From the cozy indoor spaces to the vibrant outdoor amenities,
    we hope you enjoy every moment. If you need anything at all during your stay, please don't
    hesitate to reach out — we're here to help and ensure your experience is seamless.

