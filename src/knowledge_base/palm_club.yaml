dynamic:
  faqs:
  - topic: checkin_time
    question: What time is check-in?
    answer: Check-in is available any time after 4:00 PM. Earlier check-in must be mutually agreed upon
      in advance with the host.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: checkout_time
    question: What time is checkout, and is late checkout available?
    answer: Standard checkout is at 11:00 AM. Late checkout until 2:00 PM may be available depending on
      the cleaning team's schedule and may include a small fee. Request early to confirm availability.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: checkout_instructions
    question: What are the checkout instructions?
    answer: 1. Place all used towels and washcloths on the bathroom floor and bring pool towels in from
      outside. 2. Leave sheets and comforters on the beds as-is. 3. Dispose of all trash in the outdoor
      city trash cans. Do not place plastic bags in the recycling bin. Trash collection occurs on Mondays
      and Fridays. 4. Empty the outdoor grill of food or trash, ensure it is off, and avoid placing hot
      ashes in trash cans. 5. Turn off all lights and ensure the stove is off. 6. Return any rearranged
      furniture to its original location. 7. Double-check for personal belongings — forgotten items cannot
      be returned. 8. Lock all doors, including sliding doors.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: wifi
    question: What is the Wi-Fi network and password?
    answer: 'Network: Moreland. Password: Welcome7426!!'
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: parking
    question: Where can guests park?
    answer: The driveway accommodates 2 vehicles. Street parking is not permitted — all vehicles must
      be parked in the driveway.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: pool_heating
    question: Can the pool be heated, and is there a fee?
    answer: Yes, pool heating is available for a $250 service charge. Request at least 48 hours in advance.
      The pool is typically heated to around 85°F depending on outdoor temperatures.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: pool_rules
    question: What are the pool rules?
    answer: No glass in or around the pool area. No diving. Children must be supervised at all times.
      Rinse off lotions or sunscreen before entering when possible. Return pool floats to the deck box
      after use and deflate them after use.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: pool_service
    question: When does pool and landscaping service occur?
    answer: Landscaping and pool servicing occur every Tuesday. Service providers access the property
      via the side gate and will not enter the house.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: bbq_grill
    question: How do I use the outdoor BBQ grill?
    answer: The grill runs on natural gas — no propane tank needed. Push and turn each burner knob counterclockwise
      to the 9 o'clock position, then press the ignite button on the right side. Adjust burners as needed.
      BBQ tools are in the kitchen drawer.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: fire_pit
    question: How do I use the fire pit?
    answer: The fire pit runs on natural gas. Turn the silver knob counterclockwise until you hear gas
      flow, then use the long lighter from the kitchen drawer to ignite. Adjust the flame with the control
      knob. Ensure the fire pit is fully turned off after use.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: pickleball_court
    question: Is there a pickleball court and where is the equipment?
    answer: Yes, there is a pickleball court on the property. Paddles are stored in the laundry room and
      extra pickleballs are in the first drawer in the laundry room. Return paddles after use and be mindful
      of neighbors during early morning or late night play.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
  - topic: quiet_hours
    question: What are the quiet hours?
    answer: Quiet hours are from 10 PM to 7 AM. This applies to all outdoor areas and the game room karaoke
      system.
    source_reservations:
    - 2c18536f-50f8-4578-a42f-f79ee9f705f9
    last_seen: '2026-04-18'
